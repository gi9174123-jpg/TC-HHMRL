experiment:
  seed: 42
  device: auto
  log_dir: logs
  run_name: meta_run_moderate

env:
  episode_len: 80
  n_tx: 3
  obs_noise_std: 0.01
  attenuation_c: 0.19
  d0: 1.0
  distances: [5.0, 6.0, 6.5]
  misalign_std: 0.08
  thermal_safe: 56.0
  thermal_cutoff: 66.0
  temp_init: 28.0
  amb_temp: 29.0
  gamma: 0.055
  delta: 4.2
  se_weight: 1.05
  eh_weight: 0.23
  cost_weight: 2.00
  power_weight: 0.0050
  qos_min_rate: 0.05
  mode_se_gain: [1.0, 1.24, 0.78]
  mode_eh_gain: [1.0, 0.78, 1.24]
  temporal_misalign_rho: 0.55
  attenuation_drift_rho: 0.70
  attenuation_drift_std: 0.010
  burst_prob: 0.02
  burst_strength_range: [0.06, 0.16]
  burst_decay: 0.88
  obs_bias_rho: 0.60
  obs_bias_step_std: 0.0015
  hybrid:
    tx_device: [LED, LD, LD]
    eta_led: 0.90
    eta_ld: 1.20
    attenuation_led_factor: 1.10
    attenuation_ld_factor: 0.90
    misalign_led_scale: 1.28
    misalign_ld_scale: 0.62
    noise_floor: 0.02
    noise_led_coeff: 0.016
    noise_ld_coeff: 0.029
    se_led_weight: 0.97
    se_ld_weight: 1.06
    eh_led_weight: 1.18
    eh_ld_weight: 0.85
    thermal_led_coeff: 1.05
    thermal_ld_coeff: 1.42
    burst_led_factor: 0.92
    burst_ld_factor: 1.25

safety:
  min_dwell_steps: 2
  soft_alpha: 0.28
  cutoff_alpha: 0.36
  projection_beta: 10.0
  mask_floor: 0.02
  current_max: [2.8, 2.8, 2.8]
  bus_current_max: 5.8
  thermal_safe: 55.0
  thermal_cutoff: 65.0

agent:
  obs_dim: 20
  act_lower_dim: 5
  z_dim: 8
  lower_upper_ctx_dim: 7
  hidden_dim: 192
  n_upper_actions: 12
  upper_hold_steps: 2
  lower_updates_per_step: 2
  upper_update_every: 2
  gamma: 0.99
  tau: 0.005
  batch_size: 128
  warmup_steps: 1500

upper_dqn:
  lr: 2.0e-4
  epsilon_start: 1.0
  epsilon_final: 0.08
  epsilon_decay_steps: 12000
  target_update_every: 100
  grad_clip: 5.0

lower_sac:
  actor_lr: 2.0e-4
  critic_lr: 3.0e-4
  alpha: 0.10
  grad_clip: 5.0

meta:
  n_tasks_per_iter: 6
  meta_iters: 80
  support_episodes: 3
  query_episodes: 2
  dual_lr: 0.05
  dual_lrs: [0.02, 0.05, 0.05, 0.05]
  dual_target_cost: 0.0015
  dual_max_lambda: 50.0
  dual_names: [qos, temp_anchor, temp_boost1, temp_boost2]
  dual_target_costs: [0.0, 0.0015, 0.0015, 0.0015]
  dual_max_lambdas: [50.0, 50.0, 50.0, 50.0]
  explicit_inner_outer: true
  outer_step_size: 0.15
  query_updates_enabled: true
  inner_warmup_steps: 128
  inner_upper_warmup_steps: 64

buffer:
  replay_size: 100000
  context_max_len: 200

context:
  input_dim: 30
  gru_hidden: 64
  z_dim: 8
  kl_beta: 1.0e-3
  pred_w: 0.5
  lr: 3.0e-4

sampler:
  attenuation_c_range: [0.14, 0.24]
  misalign_std_range: [0.05, 0.11]
  amb_temp_range: [27.0, 32.0]
  gamma_range: [0.04, 0.07]
  delta_range: [3.4, 5.2]
