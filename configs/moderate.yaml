experiment:
  seed: 42
  device: auto
  log_dir: logs
  run_name: meta_run_moderate

env:
  episode_len: 80
  n_tx: 3
  obs_noise_std: 0.01
  attenuation_c: 0.19
  d0: 1.0
  distances: [5.0, 6.0, 6.5]
  misalign_std: 0.08
  thermal_safe: 56.0
  thermal_cutoff: 66.0
  temp_init: 28.0
  amb_temp: 29.0
  gamma: 0.055
  delta: 4.2
  se_weight: 1.05
  eh_weight: 0.23
  cost_weight: 2.00
  power_weight: 0.0050
  qos_min_rate: 0.05
  mode_se_gain: [1.0, 1.24, 0.78]
  mode_eh_gain: [1.0, 0.78, 1.24]
  temporal_misalign_rho: 0.55
  attenuation_drift_rho: 0.70
  attenuation_drift_std: 0.010
  burst_prob: 0.02
  burst_strength_range: [0.06, 0.16]
  burst_decay: 0.88
  obs_bias_rho: 0.60
  obs_bias_step_std: 0.0015
  hybrid:
    tx_device: [LED, LD, LD]
    eta_led: 0.90
    eta_ld: 1.20
    attenuation_led_factor: 1.10
    attenuation_ld_factor: 0.90
    misalign_led_scale: 1.28
    misalign_ld_scale: 0.62
    noise_floor: 0.02
    noise_led_coeff: 0.016
    noise_ld_coeff: 0.029
    se_led_weight: 0.97
    se_ld_weight: 1.06
    eh_led_weight: 1.18
    eh_ld_weight: 0.85
    thermal_led_coeff: 1.05
    thermal_ld_coeff: 1.42
    burst_led_factor: 0.92
    burst_ld_factor: 1.25

safety:
  thermal_parameter_source: nominal_plus_online_effective_gain
  gamma_nominal: 0.055
  effective_gain_initial: [4.4, 6.0, 6.0]
  current_decoder: structured_total_allocation
  allocation_logit_scale: 2.0
  inactive_source_mask_mode: hard_zero
  min_dwell_steps: 2
  soft_alpha: 0.28
  cutoff_alpha: 0.36
  projection_beta: 10.0
  mask_floor: 0.02
  current_max: [2.8, 2.8, 2.8]
  bus_current_max: 5.8
  thermal_safe: 55.0
  thermal_cutoff: 65.0

adaptive_thermal:
  enabled: true
  excitation_threshold: 0.03
  ema_alpha: 0.10
  innovation_clip: 3.0
  uncertainty_beta_min: 0.5
  uncertainty_beta_max: 1.5
  min_gain: 1.0
  max_gain: 14.0
  initial_effective_gain: [4.4, 6.0, 6.0]
  initial_std: 0.5

physical_context:
  enabled: true
  input_dim: 18
  hidden_dim: 64
  embedding_dim: 32
  include_gain_mean: true
  include_gain_std: true
  include_temp_slope: true
  include_headroom: true
  include_bus_headroom: true
  include_projection_residual: true

constraint_critics:
  enabled: true
  out_dim: 4
  reward_target: reward_task
  actor_weights: [0.05, 0.10, 0.10, 0.10]
  target_nonnegative: true
  actor_penalty_nonnegative: true

constraint_replay:
  enabled: true
  uniform_fraction: 0.50
  boundary_fraction: 0.30
  violation_fraction: 0.20
  thermal_headroom_threshold: 2.0
  qos_margin_threshold: null
  bus_utilization_threshold: 0.85
  projection_residual_threshold: 0.10
  constraint_cost_threshold: 1.0e-8
  temperature_slope_threshold: 0.30
  importance_weighting: true
  importance_weight_clip: [0.25, 4.0]
  require_boundary_thresholds: true
  empty_bucket_warn_after: 20

residual_planner:
  enabled: true
  candidate_count: 24
  total_current_raw_step: 0.10
  allocation_logit_raw_step: 0.10
  ratio_raw_step: 0.10
  disagreement_beta: 0.10
  projection_penalty: 0.10
  constraint_beta: 1.0
  thermal_risk_beta: 0.05
  thermal_margin_target_c: 1.0
  thermal_horizon: 2
  start_meta_iter: 60
  thermal_horizon_start_meta_iter: 86
  adaptive_budget_enabled: true
  budget_candidates: [0, 8, 16, 24]
  budget_low_periodic_interval: 10
  budget_low_periodic_k: 8
  budget_medium_k: 16
  budget_high_k: 24
  budget_high_headroom_c: 1.0
  budget_medium_headroom_c: 3.0
  budget_high_gain_std: 1.5
  budget_medium_gain_std: 0.5
  budget_high_disagreement: 1.0
  budget_medium_disagreement: 0.25
  budget_high_constraint: 0.20
  budget_medium_constraint: 0.05
  budget_high_projection_residual: 0.25
  budget_medium_projection_residual: 0.10
  trust_region_enabled: true
  trust_region_mode: raw_and_executed
  trust_region_raw_l2: null
  trust_region_exec_l2: null
  replacement_margin_mode: normalized
  replacement_margin: null
  normalized_margin_factor: 0.25
  constraint_tolerance: 0.0
  projection_residual_limit: null
  h2_veto_enabled: true
  h2_margin: 0.0
  h2_increment_beta: 0.05

agent:
  obs_dim: 20
  act_lower_dim: 5
  z_dim: 8
  lower_upper_ctx_dim: 7
  hidden_dim: 192
  n_upper_actions: 12
  upper_hold_steps: 2
  lower_updates_per_step: 2
  upper_update_every: 1
  gamma: 0.99
  tau: 0.005
  batch_size: 128
  upper_batch_size: 64
  warmup_steps: 1500

upper_dqn:
  double_dqn: true
  dueling: true
  batch_size: 64
  lr: 2.0e-4
  epsilon_start: 1.0
  epsilon_final: 0.08
  epsilon_decay_steps: 12000
  target_update_every: 100
  grad_clip: 5.0

lower_sac:
  actor_lr: 2.0e-4
  critic_lr: 3.0e-4
  alpha: 0.10
  grad_clip: 5.0

meta:
  n_tasks_per_iter: 8
  meta_iters: 100
  support_episodes: 5
  support_adaptation_episodes: 3
  support_gate_validation_episodes: 2
  query_episodes: 2
  dual_lr: 0.05
  dual_lrs: [0.02, 0.05, 0.05, 0.05]
  dual_target_cost: 0.0015
  dual_max_lambda: 50.0
  dual_names: [qos, temp_anchor, temp_boost1, temp_boost2]
  dual_target_costs: [0.0, 0.0015, 0.0015, 0.0015]
  dual_max_lambdas: [50.0, 50.0, 50.0, 50.0]
  explicit_inner_outer: true
  outer_step_size: 0.15
  query_updates_enabled: false
  query_context_updates_enabled: true
  protocol_name: strict_support_query
  support_gate:
    enabled: true
    role: rollback_guard
    rule: safety_first
    paired_validation: true
    reward_weight: 1.0
    cost_weight: 1.0
    violation_weight: 1.0
    score_threshold: 0.0
    normalized_reward_threshold: 0.0
    reward_normalization_eps: 1.0
    max_cost_increase: 1.0e-5
    max_violation_increase: 1.0e-4
    min_parameter_delta_norm: 0.0
    max_parameter_delta_norm: .inf
    query_leakage: false
    extra_support_rollouts: 2
    extra_gradient_updates: 0
    extra_query_evaluations: 0
  inner_warmup_steps: 128
  inner_upper_warmup_steps: 64
  checkpoint_selection:
    enabled: true
    mode: heldout_eval
    min_iter: 86
    eval_tasks: 10
    eval_eps: 3
    reward_w: 1.0
    se_w: 0.0
    eh_w: 0.0
    cost_w: 1.0
    violation_w: 1.0

buffer:
  replay_size: 100000
  context_max_len: 560

context:
  enabled: true
  input_dim: 37
  gru_hidden: 64
  z_dim: 8
  kl_beta: 1.0e-3
  pred_w: 0.5
  lr: 3.0e-4

sampler:
  attenuation_c_range: [0.14, 0.24]
  misalign_std_range: [0.05, 0.11]
  amb_temp_range: [27.0, 32.0]
  gamma_range: [0.04, 0.07]
  delta_range: [3.4, 5.2]
