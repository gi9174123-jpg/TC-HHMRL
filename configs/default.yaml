experiment:
  seed: 42
  device: cpu
  log_dir: logs
  run_name: meta_run

alignment:
  alignment_version: system_model_v1
  task_summary_version: site_v2
  pre_alignment: false

env:
  episode_len: 80
  n_tx: 3
  obs_noise_std: 0.01
  attenuation_c: 0.24
  d0: 1.0
  distances: [5.0, 6.0, 6.5]
  misalign_std: 0.10
  thermal_safe: 50.0
  thermal_cutoff: 60.0
  temp_init: 28.0
  amb_temp: 32.0
  gamma: 0.070
  delta: 5.2
  se_weight: 1.08
  eh_weight: 0.22
  cost_weight: 2.40
  power_weight: 0.0032
  qos_min_rate: 0.05
  mode_se_gain: [1.0, 1.30, 0.72]
  mode_eh_gain: [1.0, 0.72, 1.30]
  temporal_misalign_rho: 0.75
  attenuation_drift_rho: 0.86
  attenuation_drift_std: 0.016
  burst_prob: 0.05
  burst_strength_range: [0.10, 0.22]
  burst_decay: 0.85
  obs_bias_rho: 0.90
  obs_bias_step_std: 0.003
  hybrid:

    tx_device: [LED, LD, LD]
    eta_led: 0.90
    eta_ld: 1.25
    attenuation_led_factor: 1.12
    attenuation_ld_factor: 0.88
    misalign_led_scale: 1.30
    misalign_ld_scale: 0.55
    noise_floor: 0.02
    noise_led_coeff: 0.017
    noise_ld_coeff: 0.034
    se_led_weight: 0.95
    se_ld_weight: 1.10
    eh_led_weight: 1.15
    eh_ld_weight: 0.82
    thermal_led_coeff: 1.08
    thermal_ld_coeff: 1.60
    burst_led_factor: 0.90
    burst_ld_factor: 1.40

safety:
  projection_mode: smooth
  min_dwell_steps: 2
  soft_alpha: 0.22
  cutoff_alpha: 0.30
  projection_beta: 10.0
  mask_floor: 0.02
  current_max: [3.0, 3.0, 3.0]
  bus_current_max: 6.4
  thermal_safe: 49.0
  thermal_cutoff: 59.0

agent:
  obs_dim: 20
  act_lower_dim: 5
  z_dim: 8
  lower_upper_ctx_dim: 7
  hidden_dim: 192
  n_upper_actions: 12
  upper_hold_steps: 2
  lower_updates_per_step: 2
  upper_update_every: 2
  gamma: 0.99
  tau: 0.005
  batch_size: 128
  warmup_steps: 1500

upper_dqn:
  lr: 2.0e-4
  epsilon_start: 1.0
  epsilon_final: 0.08
  epsilon_decay_steps: 12000
  target_update_every: 100
  grad_clip: 5.0

lower_sac:
  actor_lr: 2.0e-4
  critic_lr: 3.0e-4
  alpha: 0.10
  grad_clip: 5.0

lower_ddpg:
  replay_size: 1000000
  batch_size: 64
  actor_lr: 1.0e-4
  critic_lr: 3.0e-4
  gamma: 0.99
  target_tau: 0.2
  noise_std: 0.10
  grad_clip: 5.0

meta:
  n_tasks_per_iter: 6
  meta_iters: 80
  support_episodes: 3
  query_episodes: 2
  dual_lr: 0.05
  dual_lrs: [0.02, 0.05, 0.05, 0.05]
  dual_target_cost: 0.0015
  dual_max_lambda: 50.0
  dual_names: [qos, temp_anchor, temp_boost1, temp_boost2]
  dual_target_costs: [0.0, 0.0015, 0.0015, 0.0015]
  dual_max_lambdas: [50.0, 50.0, 50.0, 50.0]
  explicit_inner_outer: true
  outer_step_size: 0.15
  query_updates_enabled: true
  inner_warmup_steps: 128
  inner_upper_warmup_steps: 64
  checkpoint_selection:
    enabled: true
    mode: heldout_eval
    eval_tasks: 3
    eval_eps: 1
    reward_w: 1.0
    se_w: 0.0
    eh_w: 0.0
    cost_w: 1.0
    violation_w: 1.0

buffer:
  replay_size: 100000
  context_max_len: 200

context:
  input_dim: 37
  gru_hidden: 64
  z_dim: 8
  kl_beta: 1.0e-3
  pred_w: 0.5
  lr: 3.0e-4

sampler:
  attenuation_c_range: [0.18, 0.30]
  misalign_std_range: [0.07, 0.14]
  amb_temp_range: [30.0, 35.0]
  gamma_range: [0.05, 0.09]
  delta_range: [4.4, 6.4]
  balanced_sampling: true
  strict_site_bank: true
  default_distances: [5.0, 6.0, 6.5]
  site_bank:
    - site_id: 0
      distances: [4.8, 5.8, 6.3]
      attenuation_c_range: [0.18, 0.26]
      misalign_std_range: [0.07, 0.12]
      amb_temp_range: [30.0, 34.0]
      gamma_range: [0.05, 0.08]
      delta_range: [4.4, 5.8]
    - site_id: 1
      distances: [5.0, 6.0, 6.5]
      attenuation_c_range: [0.20, 0.28]
      misalign_std_range: [0.08, 0.13]
      amb_temp_range: [31.0, 35.0]
      gamma_range: [0.06, 0.09]
      delta_range: [4.8, 6.2]
    - site_id: 2
      distances: [5.3, 6.3, 6.9]
      attenuation_c_range: [0.22, 0.30]
      misalign_std_range: [0.09, 0.14]
      amb_temp_range: [32.0, 35.0]
      gamma_range: [0.06, 0.09]
      delta_range: [5.0, 6.4]
